services:
  db:
    image: postgres:17
    container_name: gamedock-db
    environment:
      POSTGRES_DB: gamedock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - gamedock-data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: GameDock_Backend/Dockerfile
    ports:
      - "5000:8080"
    container_name: gamedock-backend
    depends_on:
      - db
    environment:
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=gamedock;Username=postgres;Password=postgres

  frontend:
    build:
      context: ../../GameDock-Frontend/GameDock.Frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    container_name: gamedock-frontend
    depends_on:
      - backend

volumes:
  gamedock-data: